<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Menu Example</title>
    <style>
         {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        
        nav {
            background-color: #696969;
            overflow: hidden;
        }

        /* Navigation links */
        nav a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
            font-size: 17px;
            transition: background-color 0.3s;
        }
        
        nav a:hover {
            background-color: #575757;
        }

        nav a.active {
            background-color: #04AA6D;
        }

        
        @media screen and (max-width: 600px) {
            nav a {
                float: none;
                width: 100%;
                text-align: left;
                padding-left: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation Menu -->
    <nav>
        <a href="#home" class="active">Home</a>
        <a href="#week1">Week 1</a>
        <a href="#week2">Week 2</a>
        <a href="#week3">Week 3</a>
        <a href="#week4">Week 4</a>
    </nav>

    <!-- Page Content -->
    <div style="padding:20px;">
        <h1>Welcome</h1>
        <p>This is my navigation menu for Week 1.</p>
    </div>

</body>
</html>
